<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servicios Ya - Registro de Profesional</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="auth-wrapper" style="max-width: 750px;">
    <div class="glass-panel" style="position: relative; overflow: hidden; padding: 2rem;">
      <h2
        style="font-size: 1.8rem; margin-bottom: 0.5rem; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
        Registro de Profesional</h2>
      <p class="subtitle" style="margin-bottom: 1.5rem;" id="step-subtitle">Paso 1: Datos Personales</p>

      <!-- Progress Bar -->
      <div
        style="width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 2rem; position: relative;">
        <div id="progress-bar"
          style="width: 50%; height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.4s ease;">
        </div>
      </div>

      <form id="prestadorForm" action="http://localhost/Formulario/public/prestadores" method="POST"
        style="position: relative; min-height: 380px;">

        <!-- Paso 1 -->
        <div id="step-1" style="transition: all 0.4s ease; position: absolute; width: 100%; left: 0;">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
              <label>Nombre de usuario</label>
              <input type="text" name="user_name" required minlength="3" maxlength="50" placeholder="Ej: juanperez">
            </div>
            <div class="form-group">
              <label>DNI</label>
              <input type="text" name="dni" required pattern="\d{7,8}" placeholder="Sin puntos">
            </div>
            <div class="form-group">
              <label>Ubicación</label>
              <input type="text" name="location" required minlength="5" maxlength="100" placeholder="Ciudad, Provincia">
            </div>
            <div class="form-group">
              <label>Teléfono</label>
              <input type="tel" name="phone" required pattern="\d{8,15}" placeholder="Ej: 1123456789">
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" name="email" required placeholder="correo@ejemplo.com">
            </div>
            <div class="form-group">
              <label>Contraseña</label>
              <input type="password" name="password" required minlength="6" placeholder="Mínimo 6 caracteres">
            </div>
          </div>
          <button type="button" id="btn-next" class="btn btn-primary btn-block" style="margin-top: 1rem;">Siguiente
            →</button>
        </div>

        <!-- Paso 2 -->
        <div id="step-2"
          style="transition: all 0.4s ease; position: absolute; width: 100%; left: 120%; opacity: 0; visibility: hidden;">
          <div class="form-group">
            <label>Nombre del servicio</label>
            <input type="text" name="name" required minlength="3" maxlength="50"
              placeholder="Ej: Electricista Matriculado">
          </div>
          <div class="form-group">
            <label>Categoría</label>
            <select name="category" required
              style="width: 100%; padding: 0.6rem 0.8rem; background: rgba(0, 0, 0, 0.5); border: 1px solid var(--card-border); border-radius: 10px; color: white; font-size: 0.95rem; outline: none; cursor: pointer; transition: all 0.3s ease;">
              <option value="hogar">Hogar</option>
              <option value="tecnologia">Tecnología</option>
              <option value="transporte">Transporte</option>
            </select>
          </div>
          <div class="form-group">
            <label>Descripción detallada</label>
            <textarea name="description" required placeholder="Describe los servicios que ofreces..."
              style="width: 100%; padding: 0.6rem 0.8rem; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--card-border); border-radius: 10px; color: white; font-size: 0.95rem; font-family: inherit; resize: vertical; min-height: 80px; outline: none; transition: all 0.3s ease;"></textarea>
          </div>

          <div style="display: flex; gap: 1rem; margin-top: 2.2rem;">
            <button type="button" id="btn-prev" class="btn btn-secondary" style="flex: 1;">← Atrás</button>
            <button type="submit" class="btn btn-primary" style="flex: 2;">Finalizar Registro</button>
          </div>
        </div>

      </form>

      <div id="mensaje"
        style="display:none; padding:10px; margin-top:20px; border-radius:10px; border:1px solid #4CAF50; background:rgba(76, 175, 80, 0.1); color:#4CAF50;">
        ¡Profesional registrado con éxito!
      </div>

      <a href="home.html" class="btn btn-text" style="margin-top: 2rem;">← Volver al inicio</a>
    </div>
  </div>

  <style>
    textarea:focus,
    select:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2) !important;
    }
  </style>

  <script>
    const step1 = document.getElementById('step-1');
    const step2 = document.getElementById('step-2');
    const btnNext = document.getElementById('btn-next');
    const btnPrev = document.getElementById('btn-prev');
    const progressBar = document.getElementById('progress-bar');
    const stepSubtitle = document.getElementById('step-subtitle');

    btnNext.addEventListener('click', () => {
      // Validate step 1 fields before moving (optional but recommended)
      const inputs = step1.querySelectorAll('input[required]');
      let allValid = true;
      inputs.forEach(input => { if (!input.checkValidity()) { input.reportValidity(); allValid = false; } });
      if (!allValid) return;

      step1.style.opacity = '0';
      step1.style.visibility = 'hidden';
      step1.style.left = '-100%';

      step2.style.opacity = '1';
      step2.style.visibility = 'visible';
      step2.style.left = '0';

      progressBar.style.width = '100%';
      stepSubtitle.textContent = 'Paso 2: Datos del Servicio';
    });

    btnPrev.addEventListener('click', () => {
      step2.style.opacity = '0';
      step2.style.visibility = 'hidden';
      step2.style.left = '120%';

      step1.style.opacity = '1';
      step1.style.visibility = 'visible';
      step1.style.left = '0';

      progressBar.style.width = '50%';
      stepSubtitle.textContent = 'Paso 1: Datos Personales';
    });

    document.getElementById("prestadorForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const formData = new FormData(this);
      const response = await fetch(this.action, {
        method: this.method,
        body: formData
      });
      const data = await response.json();

      if (data.ok) {
        document.getElementById("mensaje").style.display = "block";
        this.reset();
        btnPrev.click(); // Reset to step 1
      } else {
        alert("Error: " + (data.errors ? JSON.stringify(data.errors) : data.error));
      }
    });
  </script>
</body>

</html>
