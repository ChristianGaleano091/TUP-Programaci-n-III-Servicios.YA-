<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Servicios Ya</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-wrapper" style="max-width: 500px;">
    <div class="glass-panel">
      
      <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">¡Hola de nuevo!</h2>
      <p class="subtitle" style="margin-bottom: 1rem;">Ingresa a tu cuenta para continuar</p>
      
      <form id="loginForm" action="#" method="POST">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
        </div>
        
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn btn-primary btn-block">Iniciar Sesión</button>
      </form>

      <a href="home.html" class="btn btn-text">← Volver al inicio</a>

    </div>
  </div>

  <script>
    // Placeholder para la lógica de inicio de sesión
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      alert("La lógica de inicio de sesión se conectará pronto en el backend.");
    });
  </script>

</body>
</html>
